# Single-origin serving for the Lemur Tap Mini App.
# Mirrors the dev Vite setup: this nginx serves the built SPA and proxies
# /api/* to the NestJS API container on the same compose network.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/wasm;

    # Same-origin API: forward /api/* to the NestJS server (global prefix /api/v1).
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Hashed build assets — long cache.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback (react-router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
